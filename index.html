<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Hub | Community</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Navbar & Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #0a0a0a;
            border-bottom: 2px solid #8a2be2;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tabs {
            display: flex;
            gap: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 5px;
            transition: 0.3s;
        }

        .tab-btn:hover, .tab-btn.active {
            color: #8a2be2;
        }

        .upload-btn {
            background-color: #8a2be2;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(138, 43, 226, 0.3);
        }

        .upload-btn:hover {
            background-color: #a04ef6;
            transform: translateY(-2px);
        }

        /* Content Area */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Script Card */
        .script-card {
            background-color: #121212;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #222;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .script-card:hover {
            border-color: #8a2be2;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.15);
        }

        .script-card h4 {
            margin: 0 0 15px 0;
            font-size: 20px;
            color: #f0f0f0;
            letter-spacing: 0.5px;
        }

        .copy-btn {
            background-color: #8a2be2;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.2s;
            text-transform: uppercase;
            font-size: 13px;
        }

        .copy-btn:active {
            transform: scale(0.96);
        }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
        }

        .modal-content {
            background: #181818;
            margin: 8% auto;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            border-radius: 15px;
            border: 1px solid #8a2be2;
        }

        .modal-content h3 { 
            margin-top: 0; 
            color: #8a2be2; 
            font-size: 24px;
        }

        input, textarea {
            width: 100%;
            margin-bottom: 20px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            padding: 14px;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #8a2be2;
        }

        textarea { 
            height: 180px; 
            resize: none; 
            font-family: 'Courier New', Courier, monospace; 
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .cancel-btn {
            background: transparent;
            color: #888;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .confirm-btn {
            background: #8a2be2;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="tabs">
            <button class="tab-btn active">Script Hub</button>
            <button class="tab-btn">Search</button>
            <button class="tab-btn">Executor</button>
        </div>
        <button class="upload-btn" onclick="openModal()">Upload Script</button>
    </nav>

    <main class="container">
        <div id="script-list" class="script-grid">
            </div>
    </main>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>Upload New Script</h3>
            <input type="text" id="scriptTitle" placeholder="Script Name (e.g. Admin Hub)">
            <textarea id="scriptContent" placeholder="Paste your code here..."></textarea>
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button class="confirm-btn" onclick="submitScript()">Confirm Upload</button>
            </div>
        </div>
    </div>

    <script>
        const scriptListElement = document.getElementById('script-list');

        // Load data from LocalStorage on startup
        window.onload = () => {
            const savedScripts = JSON.parse(localStorage.getItem('userScripts')) || [];
            savedScripts.forEach(s => addScriptToUI(s.title, s.content));
        };

        function openModal() {
            document.getElementById('uploadModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('uploadModal').style.display = 'none';
            document.getElementById('scriptTitle').value = '';
            document.getElementById('scriptContent').value = '';
        }

        function submitScript() {
            const title = document.getElementById('scriptTitle').value;
            const content = document.getElementById('scriptContent').value;

            if (title.trim() === "" || content.trim() === "") {
                alert("Please provide both a title and the script content.");
                return;
            }

            const savedScripts = JSON.parse(localStorage.getItem('userScripts')) || [];
            savedScripts.push({ title, content });
            localStorage.setItem('userScripts', JSON.stringify(savedScripts));

            addScriptToUI(title, content);
            closeModal();
        }

        function addScriptToUI(title, content) {
            const card = document.createElement('div');
            card.className = 'script-card';
            
            // Basic sanitization for the copy function
            const cleanContent = content.replace(/'/g, "\\'").replace(/"/g, "&quot;");

            card.innerHTML = `
                <h4>${title}</h4>
                <button class="copy-btn" onclick="copyToClipboard('${cleanContent}')">Copy Script</button>
            `;
            scriptListElement.appendChild(card);
        }

        function copyToClipboard(text) {
            const tempInput = document.createElement('textarea');
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            
            alert("Script copied to clipboard!");
        }

        // Close modal when clicking outside of it
        window.onclick = function(event) {
            const modal = document.getElementById('uploadModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
